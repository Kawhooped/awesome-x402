name: Restore README

on:
  workflow_dispatch:

jobs:
  restore:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Rebuild full README from upstream + Capital x402
        run: |
          python3 <<'PY'
          import urllib.request
          from pathlib import Path

          url = "https://raw.githubusercontent.com/xpaysh/awesome-x402/main/README.md"
          req = urllib.request.Request(url, headers={"User-Agent": "restore-readme"})
          up = urllib.request.urlopen(req).read().decode("utf-8")

          capital = (
              "- [Capital x402](https://voidd.live/capital/) - Agent micro-utilities paid via x402 USDC on Base mainnet "
              "from $0.001 USDC per call (value-tiered). Stable discovery on voidd.live; live paid host is listed in "
              "paid-url.json when the rail is public. ([agent.json](https://voidd.live/agent.json) · "
              "[Bazaar](https://voidd.live/.well-known/x402-bazaar.json) · "
              "[paid-url](https://voidd.live/capital/paid-url.json))\n"
          )
          needle = "### Tools & Services\n"
          if needle not in up:
              raise SystemExit("needle ### Tools & Services not found in upstream README")
          if up.strip() == "PLACEHOLDER":
              raise SystemExit("upstream is PLACEHOLDER")

          new = up.replace(needle, needle + capital, 1)
          if "Capital x402" not in new or "voidd.live" not in new:
              raise SystemExit("markers missing after insert")
          if new.strip() == "PLACEHOLDER":
              raise SystemExit("refusing PLACEHOLDER")

          Path("README.md").write_text(new, encoding="utf-8", newline="\n")
          print("wrote README.md chars", len(new))
          PY

      - name: Commit and push restored README
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md
          if git diff --cached --quiet; then
            echo "No README changes to commit"
            exit 0
          fi
          git commit -m "Add Capital x402 to Ecosystem Tools & Services"
          git push origin HEAD:main
